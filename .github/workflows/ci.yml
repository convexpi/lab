name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  multilang-conformance:
    name: R / Julia conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install R
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends r-base-core
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run R / Julia conformance (same engine scores every language)
        run: pytest tests/test_multilang_r.py tests/test_multilang_julia.py -q
